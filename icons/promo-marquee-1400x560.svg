<?xml version="1.0" encoding="UTF-8"?>
<!--
  Fake Discount Bulgaria — marquee promo tile (1400 × 560).
  Used as the large hero banner on the Chrome Web Store category pages.
  Export to PNG at 1400 × 560 and upload via:
    Developer Dashboard → Store listing → Graphic assets → Marquee promo tile

  Layout (three vertical zones):
    Left  (0 – 470 px)   — brand block: icon + name + tagline
    Mid   (470 – 950 px) — widget chart mockup (FAKE DISCOUNT verdict)
    Right (950 – 1400 px)— feature bullets + supported-shop row
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
  <defs>
    <linearGradient id="bgRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3F4D"/>
      <stop offset="100%" stop-color="#8C0314"/>
    </linearGradient>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F5F7"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Whole-canvas light background -->
  <rect width="1400" height="560" fill="url(#bgLight)"/>

  <!-- LEFT zone: red brand block -->
  <rect x="0" y="0" width="470" height="560" fill="url(#bgRed)"/>

  <!-- Icon enlarged inside left brand block -->
  <g transform="translate(75, 70) scale(2.2)">
    <text x="48" y="97" text-anchor="middle"
          font-family="Helvetica Neue, Arial Black, Helvetica, sans-serif"
          font-size="98" font-weight="900" fill="#FFFFFF">%</text>
    <g transform="translate(62, 52)">
      <circle cx="24" cy="24" r="22" fill="#3C0008" opacity="0.35"/>
      <circle cx="24" cy="24" r="22" fill="#D60815" opacity="0.65"/>
      <circle cx="24" cy="24" r="22" fill="none" stroke="#FFFFFF" stroke-width="6"/>
      <circle cx="16" cy="14" r="7" fill="url(#lensGlow)"/>
      <line x1="40" y1="40" x2="56" y2="56" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Brand name on left, below the icon -->
  <text x="75" y="430"
        font-family="Helvetica Neue, Arial Black, Helvetica, sans-serif"
        font-size="44" font-weight="900"
        fill="#FFFFFF">Fake Discount</text>
  <text x="75" y="480"
        font-family="Helvetica Neue, Arial Black, Helvetica, sans-serif"
        font-size="44" font-weight="900"
        fill="#FFFFFF">Bulgaria</text>
  <text x="75" y="514"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="16" font-weight="700" letter-spacing="3"
        fill="#FFE7E9">CATCH FAKED SALES</text>

  <!-- BG flag stripe accent -->
  <g transform="translate(75, 524)">
    <rect width="140" height="6" fill="#FFFFFF"/>
    <rect y="6" width="140" height="6" fill="#00966E"/>
    <rect y="12" width="140" height="6" fill="#D62612"/>
  </g>

  <!-- ============================================ -->
  <!-- MIDDLE zone: widget chart mockup -->
  <!-- ============================================ -->
  <g transform="translate(530, 90)" filter="url(#cardShadow)">
    <!-- Card frame -->
    <rect width="400" height="380" rx="14" fill="#FFFFFF" stroke="#E4E6EB" stroke-width="1"/>

    <!-- FAKE DISCOUNT verdict banner (matches widget's red banner) -->
    <g>
      <rect x="0" y="0" width="400" height="58" rx="14" fill="#D60815"/>
      <rect x="0" y="44" width="400" height="14" fill="#D60815"/>
      <text x="200" y="38" text-anchor="middle"
            font-family="Helvetica Neue, Arial Black, sans-serif"
            font-size="22" font-weight="900" letter-spacing="2"
            fill="#FFFFFF">FAKE DISCOUNT</text>
      <!-- Site indicator (right-side pill) -->
      <g transform="translate(310, 14)">
        <rect width="74" height="30" rx="15" fill="#FFFFFF" opacity="0.95"/>
        <text x="37" y="20" text-anchor="middle"
              font-family="Helvetica Neue, Helvetica, sans-serif"
              font-size="11" font-weight="800" letter-spacing="1"
              fill="#D60815">OZONE.BG</text>
      </g>
    </g>

    <!-- Verdict reason text -->
    <text x="200" y="86" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, sans-serif"
          font-size="11" font-weight="500"
          fill="#FFFFFF" opacity="0.92">Current price 88% above 30-day low (8 obs)</text>

    <!-- Stats grid -->
    <g transform="translate(0, 80)">
      <rect width="200" height="58" fill="#FAFAFB"/>
      <rect x="200" width="200" height="58" fill="#FAFAFB"/>
      <text x="100" y="30" text-anchor="middle"
            font-family="Helvetica Neue, Helvetica, sans-serif"
            font-size="10" font-weight="700" letter-spacing="1.2"
            fill="#666">LOWEST PRICE</text>
      <text x="100" y="50" text-anchor="middle"
            font-family="Helvetica Neue, Helvetica, sans-serif"
            font-size="18" font-weight="800"
            fill="#1B8A3E">5.99 EUR</text>
      <text x="300" y="30" text-anchor="middle"
            font-family="Helvetica Neue, Helvetica, sans-serif"
            font-size="10" font-weight="700" letter-spacing="1.2"
            fill="#666">HIGHEST PRICE</text>
      <text x="300" y="50" text-anchor="middle"
            font-family="Helvetica Neue, Helvetica, sans-serif"
            font-size="18" font-weight="800"
            fill="#D60815">99.99 EUR</text>
    </g>

    <!-- Chart area -->
    <g transform="translate(20, 165)">
      <!-- Chart border -->
      <rect width="360" height="190" fill="#FFFFFF"/>
      <!-- Horizontal grid lines -->
      <g stroke="#E4E6EB" stroke-width="1">
        <line x1="0" y1="0"   x2="360" y2="0"/>
        <line x1="0" y1="38"  x2="360" y2="38"/>
        <line x1="0" y1="76"  x2="360" y2="76"/>
        <line x1="0" y1="114" x2="360" y2="114"/>
        <line x1="0" y1="152" x2="360" y2="152"/>
        <line x1="0" y1="190" x2="360" y2="190"/>
      </g>
      <!-- Y-axis labels -->
      <g font-family="Helvetica Neue, Helvetica, sans-serif" font-size="9" fill="#999" text-anchor="end">
        <text x="-4" y="4">100</text>
        <text x="-4" y="42">80</text>
        <text x="-4" y="80">60</text>
        <text x="-4" y="118">40</text>
        <text x="-4" y="156">20</text>
        <text x="-4" y="194">0</text>
      </g>
      <!-- Average line (dotted) -->
      <line x1="0" y1="135" x2="360" y2="135"
            stroke="#0066FF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.7"/>
      <text x="358" y="131" text-anchor="end"
            font-family="Helvetica Neue, Helvetica, sans-serif"
            font-size="9" font-style="italic" fill="#0066FF" opacity="0.85">avg</text>

      <!-- Suspicious price line: flat low → spike up → drop -->
      <path d="M 0 178 L 50 178 L 100 178 L 150 178 L 200 178 L 240 16 L 280 16 L 320 178 L 360 178"
            fill="none" stroke="#D60815" stroke-width="3" stroke-linejoin="round"/>
      <!-- Filled area below line -->
      <path d="M 0 178 L 50 178 L 100 178 L 150 178 L 200 178 L 240 16 L 280 16 L 320 178 L 360 178 L 360 190 L 0 190 Z"
            fill="#D60815" opacity="0.08"/>
      <!-- Data points -->
      <g fill="#D60815">
        <circle cx="0"   cy="178" r="4"/>
        <circle cx="50"  cy="178" r="4"/>
        <circle cx="100" cy="178" r="4"/>
        <circle cx="150" cy="178" r="4"/>
        <circle cx="200" cy="178" r="4"/>
        <circle cx="240" cy="16"  r="5" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="280" cy="16"  r="5" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="320" cy="178" r="4"/>
        <circle cx="360" cy="178" r="4"/>
      </g>

      <!-- Annotation: "the spike that wasn't real" -->
      <g transform="translate(245, 28)">
        <rect x="-2" y="-16" width="78" height="22" rx="11" fill="#1A1A1A"/>
        <text x="37" y="-1" text-anchor="middle"
              font-family="Helvetica Neue, Helvetica, sans-serif"
              font-size="10" font-weight="700"
              fill="#FFFFFF">FAKE SPIKE</text>
      </g>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- RIGHT zone: feature bullets + shop logos -->
  <!-- ============================================ -->
  <g transform="translate(990, 100)">
    <text x="0" y="0"
          font-family="Helvetica Neue, Arial Black, sans-serif"
          font-size="28" font-weight="900"
          fill="#1A1A1A">Built to call</text>
    <text x="0" y="36"
          font-family="Helvetica Neue, Arial Black, sans-serif"
          font-size="28" font-weight="900"
          fill="#D60815">retailers' bluff.</text>

    <!-- Bullets -->
    <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" fill="#1A1A1A">
      <g transform="translate(0, 86)">
        <circle cx="6" cy="6" r="6" fill="#D60815"/>
        <text x="22" y="11" font-weight="700">5 honest deal verdicts</text>
        <text x="22" y="32" font-size="13" fill="#6E6E6E">FAKE DISCOUNT · REAL DEAL · STABLE ·</text>
        <text x="22" y="50" font-size="13" fill="#6E6E6E">VOLATILE · TRACKING</text>
      </g>
      <g transform="translate(0, 168)">
        <circle cx="6" cy="6" r="6" fill="#D60815"/>
        <text x="22" y="11" font-weight="700">Real price history per product</text>
        <text x="22" y="32" font-size="13" fill="#6E6E6E">Updated every visit. No accounts.</text>
      </g>
      <g transform="translate(0, 232)">
        <circle cx="6" cy="6" r="6" fill="#D60815"/>
        <text x="22" y="11" font-weight="700">Target alerts &amp; toolbar badges</text>
        <text x="22" y="32" font-size="13" fill="#6E6E6E">🎯 fires when reality hits your number.</text>
      </g>
      <g transform="translate(0, 296)">
        <circle cx="6" cy="6" r="6" fill="#D60815"/>
        <text x="22" y="11" font-weight="700">Bulgarian + English UI</text>
        <text x="22" y="32" font-size="13" fill="#6E6E6E">EUR prices on every store.</text>
      </g>
    </g>
  </g>

  <!-- Footer: supported-shop row -->
  <g transform="translate(530, 510)">
    <text x="0" y="0"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="11" font-weight="700" letter-spacing="2"
          fill="#666">20 BULGARIAN SHOPS</text>
    <text x="0" y="22"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="13" font-weight="600"
          fill="#3A3A3A">EMAG · OZONE · NOTINO · TECHNOPOLIS · TECHNOMARKET · ZORA · ARDES · PLESIO · ABOUT YOU · ANSWEAR · DECATHLON · DM · FASHION DAYS · LILLY · MR.BRICOLAGE · OBUVKI · PRAKTIKER · SOPHARMACY · SPORT DEPOT · EBAG</text>
  </g>
</svg>
