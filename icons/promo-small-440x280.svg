<?xml version="1.0" encoding="UTF-8"?>
<!--
  Fake Discount Bulgaria — small promo tile (440 × 280).
  Used in Chrome Web Store search-result cards and category lists.
  Export to PNG at 440 × 280 and upload via:
    Developer Dashboard → Store listing → Graphic assets → Small promo tile

  Layout: red brand panel on the left (icon + name) and a white panel
  on the right with the tagline and three key value props.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3F4D"/>
      <stop offset="100%" stop-color="#8C0314"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Right white panel (full bg) -->
  <rect width="440" height="280" fill="#FFFFFF"/>

  <!-- Left red panel (170 wide) -->
  <rect x="0" y="0" width="170" height="280" fill="url(#bg)"/>

  <!-- ICON inside left panel (scaled-down version of the master icon) -->
  <g transform="translate(25, 70) scale(1.05)">
    <!-- Bold % -->
    <text x="48" y="97"
          text-anchor="middle"
          font-family="Helvetica Neue, Arial Black, Helvetica, sans-serif"
          font-size="98" font-weight="900"
          fill="#FFFFFF">%</text>
    <!-- Magnifying glass -->
    <g transform="translate(62, 52)">
      <circle cx="24" cy="24" r="22" fill="#3C0008" opacity="0.35"/>
      <circle cx="24" cy="24" r="22" fill="#D60815" opacity="0.65"/>
      <circle cx="24" cy="24" r="22" fill="none" stroke="#FFFFFF" stroke-width="6"/>
      <circle cx="16" cy="14" r="7" fill="url(#lensGlow)"/>
      <line x1="40" y1="40" x2="56" y2="56" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>

  <!-- "BG" flag accent stripe under the icon -->
  <g transform="translate(35, 232)">
    <rect width="100" height="6" fill="#FFFFFF"/>
    <rect y="6" width="100" height="6" fill="#00966E"/>
    <rect y="12" width="100" height="6" fill="#D62612"/>
  </g>

  <!-- RIGHT PANEL — text content -->
  <!-- Brand name -->
  <text x="195" y="80"
        font-family="Helvetica Neue, Arial Black, sans-serif"
        font-size="28" font-weight="900"
        fill="#1A1A1A">Fake Discount</text>
  <text x="195" y="112"
        font-family="Helvetica Neue, Arial Black, sans-serif"
        font-size="28" font-weight="900"
        fill="#D60815">Bulgaria</text>

  <!-- Tagline -->
  <text x="195" y="146"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="14" font-weight="600" letter-spacing="0.5"
        fill="#6B0210">CATCH FAKED SALES</text>

  <!-- Divider -->
  <line x1="195" y1="160" x2="285" y2="160" stroke="#D60815" stroke-width="3"/>

  <!-- Value props -->
  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" fill="#3A3A3A">
    <!-- Bullet 1 -->
    <circle cx="200" cy="185" r="3" fill="#D60815"/>
    <text x="212" y="189" font-weight="700">Real price-history charts</text>
    <!-- Bullet 2 -->
    <circle cx="200" cy="210" r="3" fill="#D60815"/>
    <text x="212" y="214" font-weight="700">5 deal verdicts &amp; targets</text>
    <!-- Bullet 3 -->
    <circle cx="200" cy="235" r="3" fill="#D60815"/>
    <text x="212" y="239" font-weight="700">20 Bulgarian online shops</text>
  </g>

  <!-- Footer line -->
  <text x="195" y="262"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="10" font-weight="500" letter-spacing="1.5"
        fill="#888888">EMAG · OZONE · NOTINO · TECHNOPOLIS · +16 MORE</text>
</svg>
