<?xml version="1.0" encoding="UTF-8"?>
<!--
  Fake Discount Bulgaria — store icon master.
  Export this SVG to PNG at four sizes for the manifest + Chrome Web Store:
    icon16.png   16x16    (toolbar @ 1x)
    icon32.png   32x32    (toolbar @ 2x)
    icon48.png   48x48    (extension management page)
    icon128.png  128x128  (Web Store icon)

  Design: a bold percent sign on a brand-red rounded square, with a
  magnifying glass examining it from the bottom-right — communicates
  "we look closely at every discount percentage".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Fake Discount Bulgaria">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3F4D"/>
      <stop offset="100%" stop-color="#8C0314"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Bold % symbol, shifted slightly left so magnifier can sit at bottom-right -->
  <text x="48" y="97"
        text-anchor="middle"
        font-family="Helvetica Neue, Arial Black, Helvetica, sans-serif"
        font-size="98" font-weight="900"
        fill="#FFFFFF">%</text>

  <!-- Magnifying glass: lens shadow + lens stroke + glass highlight + handle -->
  <g transform="translate(62, 52)">
    <!-- Lens shadow ring (depth) -->
    <circle cx="24" cy="24" r="22" fill="#3C0008" opacity="0.35"/>
    <!-- Lens body (subtle red tint shows the % through it) -->
    <circle cx="24" cy="24" r="22" fill="#D60815" opacity="0.65"/>
    <!-- White outline -->
    <circle cx="24" cy="24" r="22" fill="none" stroke="#FFFFFF" stroke-width="6"/>
    <!-- Glass highlight -->
    <circle cx="16" cy="14" r="7" fill="url(#lensGlow)"/>
    <!-- Handle -->
    <line x1="40" y1="40" x2="56" y2="56"
          stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="56" y2="56"
          stroke="#3C0008" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
